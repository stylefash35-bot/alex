<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liz April | Digital Creator</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Чтобы не было прокрутки на телефоне */
        }

        /* ЗАДНИЙ ФОН: Используем арт Лиз (например, image_8.png) */
        .background-image {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                              url('https://raw.githubusercontent.com/stylefash35-bot/april/main/templates/liz_bg.jpg'); /* ЗАМЕНИ ССЫЛКУ */
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* ЭФФЕКТ МАТОВОГО СТЕКЛА НА ВЕСЬ ЭКРАН */
        .blur-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }

        /* КОНТЕЙНЕР ПО ЦЕНТРУ */
        .main-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
            text-align: center;
        }

        /* АВАТАРКА (Сделай круглую из другого арта) */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-image: url('https://raw.githubusercontent.com/stylefash35-bot/april/main/templates/liz_avatar.jpg'); /* ЗАМЕНИ ССЫЛКУ */
            background-size: cover;
            background-position: center;
            margin-bottom: 20px;
        }

        /* ТЕКСТОВЫЕ ПЕРЕМЕННЫЕ ИЗ APP.PY */
        h1 { font-size: 26px; font-weight: 700; margin: 0 0 10px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        p { font-size: 16px; opacity: 0.9; line-height: 1.4; margin: 0 0 40px 0; max-width: 280px; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

        /* ГЛАВНАЯ КНОПКА (Стиль: Минимализм) */
        .btn-call {
            display: block;
            width: 100%;
            max-width: 280px;
            background: rgba(255, 255, 255, 0.9);
            color: #222;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .btn-call:active { transform: scale(0.96); background: rgba(255, 255, 255, 1); }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div class="blur-overlay"></div>

    <div class="main-container">
        <div class="avatar"></div>

        <h1>{{ greeting }}</h1>
        <p>{{ description }}</p>
        
        <a href="/go" class="btn-call">{{ btn_text }}</a>
    </div>

</body>
</html>
