<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liz April | Digital Creator</title>
   <style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
    }

    /* ЗАДНИЙ ФОН */
    .background-image {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        /* Путь к файлу у окна */
        background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                          url('/templates/file_00000000fca871faa613e3cc3d729672.jpg'); 
        background-size: cover;
        background-position: center;
        z-index: -2;
    }

    .blur-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        background: rgba(0, 0, 0, 0.2);
        z-index: -1;
    }

    .main-container {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        color: white;
        text-align: center;
    }

    /* АВАТАРКА */
    .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 3px solid white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        /* Путь к файлу с лицом */
        background-image: url('/templates/1775214826498.jpg'); 
        background-size: cover;
        background-position: center;
        margin-bottom: 20px;
    }

    h1 { font-size: 26px; font-weight: 700; margin: 0 0 10px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    p { font-size: 16px; opacity: 0.9; line-height: 1.4; margin: 0 0 40px 0; max-width: 280px; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

    .btn-call {
        display: block;
        width: 100%;
        max-width: 280px;
        background: rgba(255, 255, 255, 0.9);
        color: #222;
        text-decoration: none;
        padding: 16px 20px;
        border-radius: 30px;
        font-weight: 700;
        font-size: 18px;
        transition: all 0.2s ease;
        box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }
</style>
</head>
<body>

    <div class="background-image"></div>
    <div class="blur-overlay"></div>

    <div class="main-container">
        <div class="avatar"></div>

        <h1>{{ greeting }}</h1>
        <p>{{ description }}</p>
        
        <a href="/go" class="btn-call">{{ btn_text }}</a>
    </div>

</body>
</html>
